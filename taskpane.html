<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CompareDocs</title>
  <script src="https://appsforoffice.microsoft.com/lib/1.1/hosted/office.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mammoth@1.6.0/mammoth.browser.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; font-family: 'Inter', sans-serif; font-size: 13px; color: #111827; background: #F3F4F6; }

    #shell { display: flex; flex-direction: column; height: 100vh; }

    /* ── Top bar ── */
    .topbar { background: #1E3A5F; color: white; padding: 10px 14px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .topbar-name { font-size: 14px; font-weight: 700; }
    .topbar-sub  { font-size: 10px; opacity: .6; margin-top: 1px; }
    .tb-btns { display: flex; gap: 6px; }
    .tb-btn  { font-size: 11px; font-family: 'Inter', sans-serif; background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.25); color: white; border-radius: 5px; padding: 4px 9px; cursor: pointer; transition: background .15s; white-space: nowrap; }
    .tb-btn:hover:not(:disabled) { background: rgba(255,255,255,.28); }
    .tb-btn:disabled { opacity: .3; cursor: not-allowed; }

    /* ── Current email strip ── */
    .email-strip { background: white; border-bottom: 1px solid #E5E7EB; padding: 8px 14px; flex-shrink: 0; }
    .es-label { font-size: 10px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: #9CA3AF; margin-bottom: 3px; }
    .es-subject { font-size: 12px; font-weight: 600; color: #111827; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .es-from    { font-size: 11px; color: #6B7280; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .es-none    { font-size: 12px; color: #9CA3AF; font-style: italic; }

    /* ── Scroll body ── */
    #body { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 9px; }

    /* ── Cards ── */
    .card { background: white; border: 1px solid #E5E7EB; border-radius: 9px; overflow: hidden; }
    .card-hdr { padding: 8px 12px; border-bottom: 1px solid #F3F4F6; font-size: 10px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: #9CA3AF; display: flex; align-items: center; justify-content: space-between; }

    /* ── Spinner ── */
    .spin { width: 13px; height: 13px; border: 2px solid #E5E7EB; border-top-color: #1E3A5F; border-radius: 50%; animation: spin .7s linear infinite; flex-shrink: 0; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-row { display: flex; align-items: center; gap: 8px; padding: 10px 12px; font-size: 12px; color: #6B7280; }

    /* ── Attachments ── */
    .att-list { padding: 7px 9px; display: flex; flex-direction: column; gap: 5px; }
    .att-row { display: flex; align-items: center; gap: 7px; padding: 7px 9px; border-radius: 7px; border: 1px solid #E5E7EB; background: #F9FAFB; }
    .att-row.clickable { cursor: pointer; transition: border-color .15s, background .15s; }
    .att-row.clickable:hover { border-color: #1E3A5F; background: #EFF6FF; }
    .att-name { font-size: 12px; font-weight: 500; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .chip { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 4px; white-space: nowrap; flex-shrink: 0; }
    .chip-ok     { background: #F0FDF4; color: #15803D; border: 1px solid #BBF7D0; }
    .chip-tap    { background: #EFF6FF; color: #1D4ED8; border: 1px solid #BFDBFE; }
    .chip-err    { background: #FEF2F2; color: #B91C1C; border: 1px solid #FECACA; }
    .chip-no     { background: #F9FAFB; color: #9CA3AF; border: 1px solid #E5E7EB; }
    .no-atts { padding: 12px; text-align: center; font-size: 12px; color: #9CA3AF; font-style: italic; }

    /* ── Slots ── */
    .slot-list { display: flex; flex-direction: column; }
    .slot-row { display: flex; align-items: center; gap: 8px; padding: 9px 12px; border-bottom: 1px solid #F9FAFB; }
    .slot-row:last-child { border-bottom: none; }
    .s-dot  { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .d-ok   { background: #16A34A; }
    .d-req  { background: #F59E0B; }
    .d-opt  { background: #D1D5DB; }
    .s-lbl  { font-size: 12px; font-weight: 600; width: 90px; flex-shrink: 0; }
    .s-val  { font-size: 11px; color: #9CA3AF; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-style: italic; }
    .s-val.ok { color: #111827; font-style: normal; font-weight: 500; }
    .s-badge { font-size: 9px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; padding: 2px 6px; border-radius: 4px; white-space: nowrap; flex-shrink: 0; }
    .b-req  { background: #FEF3C7; color: #92400E; border: 1px solid #FDE68A; }
    .b-opt  { background: #F3F4F6; color: #9CA3AF; border: 1px solid #E5E7EB; }
    .s-rem  { background: none; border: none; cursor: pointer; color: #D1D5DB; font-size: 12px; padding: 0; transition: color .15s; }
    .s-rem:hover { color: #B91C1C; }

    /* ── Action bar ── */
    .act-bar { background: white; border: 1px solid #E5E7EB; border-radius: 9px; padding: 11px 12px; }
    .act-note { font-size: 12px; line-height: 1.5; margin-bottom: 8px; }
    .act-note.warn { color: #B45309; }
    .act-note.good { color: #15803D; }
    .act-note.muted { color: #6B7280; }
    #btn-cmp { width: 100%; padding: 11px; background: #1E3A5F; color: white; border: none; border-radius: 7px; font-size: 13px; font-weight: 600; font-family: 'Inter', sans-serif; cursor: pointer; transition: background .15s; }
    #btn-cmp:hover:not(:disabled) { background: #2D5A8E; }
    #btn-cmp:disabled { opacity: .35; cursor: not-allowed; }

    /* ── Errors ── */
    .err-bar { background: #FEF2F2; border: 1px solid #FECACA; border-radius: 8px; padding: 10px 12px; }
    .err-t { font-size: 12px; font-weight: 600; color: #B91C1C; margin-bottom: 4px; }
    .err-m { font-size: 12px; color: #7F1D1D; line-height: 1.6; }
    .err-tip { font-size: 11px; color: #B45309; margin-top: 6px; padding-top: 6px; border-top: 1px solid #FECACA; line-height: 1.55; }

    /* ── Tip bar ── */
    .tip { background: #FFFBEB; border: 1px solid #FDE68A; border-radius: 8px; padding: 10px 12px; font-size: 12px; color: #78350F; line-height: 1.65; }
    .tip strong { font-weight: 600; }

    /* ── Assign modal ── */
    .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.42); z-index: 200; display: flex; align-items: flex-end; }
    .modal { background: white; border-radius: 14px 14px 0 0; width: 100%; box-shadow: 0 -6px 28px rgba(0,0,0,.15); }
    .modal-hdr { padding: 14px 14px 10px; border-bottom: 1px solid #F3F4F6; }
    .modal-title { font-size: 13px; font-weight: 600; }
    .modal-fname { font-size: 11px; color: #6B7280; margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .modal-opts { padding: 8px 10px; display: flex; flex-direction: column; gap: 4px; }
    .m-opt { display: flex; align-items: center; gap: 9px; padding: 10px 11px; border-radius: 7px; border: 1px solid #E5E7EB; cursor: pointer; transition: all .15s; background: white; font-family: 'Inter', sans-serif; text-align: left; width: 100%; }
    .m-opt:hover:not(.m-taken) { border-color: #1E3A5F; background: #EFF6FF; }
    .m-taken { opacity: .4; cursor: not-allowed; }
    .m-dot  { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .m-lbl  { font-size: 12px; font-weight: 600; flex: 1; }
    .m-cur  { font-size: 10px; color: #9CA3AF; overflow: hidden; text-overflow: ellipsis; max-width: 80px; }
    .modal-cancel { margin: 4px 10px 12px; width: calc(100% - 20px); padding: 10px; background: #F3F4F6; border: none; border-radius: 7px; cursor: pointer; font-family: 'Inter', sans-serif; font-size: 12px; color: #6B7280; transition: background .15s; display: block; }
    .modal-cancel:hover { background: #E5E7EB; }

    /* ── Results ── */
    .r-banner { border-radius: 9px; padding: 13px; display: flex; gap: 10px; align-items: flex-start; }
    .r-icon   { width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; border: 2px solid; }
    .r-status { font-size: 13px; font-weight: 700; margin-bottom: 3px; }
    .r-summ   { font-size: 12px; line-height: 1.65; }
    .r-docs   { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 6px; }
    .r-dtag   { font-size: 10px; background: rgba(255,255,255,.6); border: 1px solid rgba(0,0,0,.08); padding: 1px 7px; border-radius: 4px; color: #374151; }

    .next-list { padding: 8px 12px; display: flex; flex-direction: column; gap: 6px; }
    .n-row { display: flex; gap: 8px; align-items: flex-start; font-size: 12px; color: #111827; line-height: 1.6; }
    .n-num { width: 18px; height: 18px; border-radius: 50%; background: #1E3A5F; color: white; font-size: 10px; font-weight: 700; flex-shrink: 0; display: flex; align-items: center; justify-content: center; margin-top: 1px; }

    .disc-wrap { display: flex; flex-direction: column; }
    .d-item { padding: 11px 12px; border-bottom: 1px solid #F9FAFB; }
    .d-item:last-child { border-bottom: none; }
    .d-top  { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; margin-bottom: 8px; }
    .sev    { font-size: 9px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; padding: 2px 7px; border-radius: 4px; }
    .sev-critical { background: #450A0A; color: #FCA5A5; }
    .sev-high     { background: #FEF2F2; color: #B91C1C; border: 1px solid #FECACA; }
    .sev-medium   { background: #FFFBEB; color: #B45309; border: 1px solid #FDE68A; }
    .sev-low      { background: #F9FAFB; color: #9CA3AF; border: 1px solid #E5E7EB; }
    .d-field { font-size: 13px; font-weight: 700; flex: 1; }
    .a-tag   { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 4px; white-space: nowrap; }

    .d-vals { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-bottom: 7px; }
    .d-vals.c3 { grid-template-columns: 1fr 1fr 1fr; }
    .dv      { background: #F9FAFB; border: 1px solid #F3F4F6; border-radius: 6px; padding: 7px 9px; }
    .dv.bad  { background: #FEF2F2; border-color: #FECACA; }
    .dv-lbl  { font-size: 9px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; margin-bottom: 4px; }
    .dv-val  { font-size: 11px; line-height: 1.45; word-break: break-word; color: #111827; }
    .dv.bad .dv-val { color: #B91C1C; font-weight: 600; }
    .dv-null { color: #9CA3AF; font-style: italic; }
    .guidance { background: #EFF6FF; border: 1px solid #BFDBFE; border-radius: 6px; padding: 8px 10px; font-size: 11px; color: #1E40AF; line-height: 1.6; }

    .all-ok { text-align: center; padding: 26px 14px; }
    .ao-ring { width: 42px; height: 42px; background: #F0FDF4; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 10px; font-size: 17px; color: #16A34A; border: 2px solid #BBF7D0; }
    .all-ok h3 { font-size: 13px; font-weight: 700; margin-bottom: 4px; }
    .all-ok p  { font-size: 12px; color: #6B7280; }
  </style>
</head>
<body>
<div id="shell">
  <div class="topbar">
    <div>
      <div class="topbar-name">CompareDocs</div>
      <div class="topbar-sub">Pin sidebar · open emails · collect docs</div>
    </div>
    <div class="tb-btns">
      <button class="tb-btn" id="btn-add" onclick="loadCurrentEmail()" disabled>Add from email</button>
      <button class="tb-btn" id="btn-clr" onclick="clearAll()" style="display:none">Clear</button>
    </div>
  </div>

  <div class="email-strip" id="email-strip">
    <div class="es-label">Current email</div>
    <div class="es-none">No email selected</div>
  </div>

  <div id="body"></div>
</div>

<!-- Assign modal -->
<div class="modal-bg" id="modal" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-hdr">
      <div class="modal-title">Assign to slot</div>
      <div class="modal-fname" id="modal-fname"></div>
    </div>
    <div class="modal-opts" id="modal-opts"></div>
    <button class="modal-cancel" onclick="closeModal()">Cancel</button>
  </div>
</div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// CONFIG — replace with your key before deploying
// ─────────────────────────────────────────────────────────────────────────────
const API_KEY = "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";

const DOCS = [
  { id:"quote",       label:"Quote",             required:true,  color:"#2563EB" },
  { id:"binder",      label:"Binder",            required:true,  color:"#16A34A" },
  { id:"invoice",     label:"Invoice",           required:true,  color:"#9333EA" },
  { id:"application", label:"ACORD Application", required:false, color:"#D97706" },
];
const DMAP = Object.fromEntries(DOCS.map(d => [d.id, d]));

const ACTIONS = {
  fix_in_binder:       { label:"Fix in Binder",       bg:"#FEF2F2", color:"#B91C1C" },
  fix_in_quote:        { label:"Fix in Quote",         bg:"#FEF2F2", color:"#B91C1C" },
  contact_underwriter: { label:"Contact Underwriter",  bg:"#FFFBEB", color:"#B45309" },
  verify_with_insured: { label:"Verify with Insured",  bg:"#EFF6FF", color:"#1D4ED8" },
  review:              { label:"Review",               bg:"#F9FAFB", color:"#6B7280" },
};

// ─── State ────────────────────────────────────────────────────────────────────
let S = {
  item: null,
  subject: "", from: "",
  atts: [],        // [{id,name,size,text,err,loading}]
  slots: {},       // {quote:{name,text}, ...}
  phase: "idle",   // idle|loading|comparing|results
  analysis: null,
  error: null,
  pending: null,   // att being assigned
};

// ─── Office init ──────────────────────────────────────────────────────────────
Office.onReady(info => {
  if (info.host !== Office.HostType.Outlook) { showFatal("Outlook only."); return; }
  Office.context.mailbox.addHandlerAsync(Office.EventType.ItemChanged, onItemChanged);
  onItemChanged();
});

function onItemChanged() {
  const item = Office.context.mailbox.item;
  S.item = item;
  S.atts = [];

  if (!item) {
    S.subject = ""; S.from = "";
    document.getElementById("btn-add").disabled = true;
    updateStrip(); render(); return;
  }

  S.subject = item.subject || "(No subject)";
  S.from = item.from?.displayName
    ? `${item.from.displayName} — ${item.from.emailAddress}`
    : item.from?.emailAddress || "";

  S.atts = (item.attachments || [])
    .filter(a => !a.isInline)
    .map(a => ({ id:a.id, name:a.name, size:a.size, text:null, err:null, loading:false }));

  document.getElementById("btn-add").disabled = false;
  updateStrip(); render();
}

function updateStrip() {
  const el = document.getElementById("email-strip");
  if (!S.item) {
    el.innerHTML = `<div class="es-label">Current email</div><div class="es-none">No email selected — click an email in your inbox</div>`;
    return;
  }
  el.innerHTML = `<div class="es-label">Current email</div>
    <div class="es-subject">${esc(S.subject)}</div>
    ${S.from ? `<div class="es-from">${esc(S.from)}</div>` : ""}`;
}

// ─── Load from current email ──────────────────────────────────────────────────
async function loadCurrentEmail() {
  if (!S.item) return;
  document.getElementById("btn-add").disabled = true;
  S.phase = "loading"; S.error = null;
  render();

  let token;
  try { token = await getToken(); }
  catch(e) {
    S.error = `Could not authenticate: ${e.message}`;
    S.phase = "idle";
    document.getElementById("btn-add").disabled = false;
    render(); return;
  }

  const restId = Office.context.mailbox.convertToRestId(
    S.item.itemId, Office.MailboxEnums.RestVersion.v2_0
  );

  for (const att of S.atts) {
    const ext = att.name.toLowerCase().split(".").pop();
    if (!["pdf","docx","txt"].includes(ext)) { att.err = "Not supported (PDF/DOCX/TXT only)"; continue; }
    att.loading = true; render();
    try   { att.text = await fetchExtract(token, restId, att.id, att.name); }
    catch(e) { att.err = e.message; }
    att.loading = false; render();
  }

  // Auto-classify usable attachments
  const usable = S.atts.filter(a => a.text?.length > 30);
  if (usable.length) {
    try {
      const classified = await classifyDocs(usable);
      for (const def of DOCS) {
        const idx = classified[def.id];
        if (idx != null && usable[idx] && !S.slots[def.id]) {
          S.slots[def.id] = { name: usable[idx].name, text: usable[idx].text };
        }
      }
    } catch(_) { /* user assigns manually */ }
  }

  S.phase = "idle";
  S.analysis = null;
  document.getElementById("btn-add").disabled = false;
  document.getElementById("btn-clr").style.display = Object.keys(S.slots).length ? "block" : "none";
  render();
}

// ─── Fetch + extract ──────────────────────────────────────────────────────────
function getToken() {
  return new Promise((res, rej) =>
    Office.context.mailbox.getCallbackTokenAsync({ isRest: true }, r =>
      r.status === Office.AsyncResultStatus.Failed ? rej(new Error(r.error.message)) : res(r.value)
    )
  );
}

async function fetchExtract(token, restId, attId, name) {
  const url = `https://outlook.office.com/api/v2.0/me/messages/${restId}/attachments/${attId}/$value`;
  const res = await fetch(url, { headers: { Authorization: `Bearer ${token}` } });
  if (!res.ok) throw new Error(`Download failed (HTTP ${res.status})`);
  const buf = await res.arrayBuffer();
  const ext = name.toLowerCase().split(".").pop();
  if (ext === "txt")  return new TextDecoder().decode(buf);
  if (ext === "pdf")  return extractPdf(buf);
  if (ext === "docx") return extractDocx(buf);
}

async function extractPdf(buf) {
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
  const pdf = await pdfjsLib.getDocument({ data: new Uint8Array(buf) }).promise;
  let out = "";
  for (let i = 1; i <= pdf.numPages; i++) {
    const pg = await pdf.getPage(i); const c = await pg.getTextContent();
    out += c.items.map(s => s.str).join(" ") + "\n";
  }
  const t = out.trim();
  if (!t) throw new Error("Scanned PDF — no selectable text. Ask underwriter for a text-based PDF.");
  return t;
}

async function extractDocx(buf) {
  if (!window.mammoth) throw new Error("DOCX reader unavailable");
  const r = await window.mammoth.extractRawText({ arrayBuffer: buf });
  const t = r.value?.trim(); if (!t) throw new Error("DOCX empty");
  return t;
}

// ─── Claude: classify ─────────────────────────────────────────────────────────
async function classifyDocs(atts) {
  const raw = await callClaude(
    "Classify insurance documents. Return only valid JSON, no markdown.",
    `Identify which file is the Quote, Binder, Invoice, and ACORD Application (null if not present).
Return ONLY: {"quote":<idx|null>,"binder":<idx|null>,"invoice":<idx|null>,"application":<idx|null>}

Files:\n${atts.map((a,i)=>`[${i}] "${a.name}"\n${a.text.slice(0,500)}`).join("\n\n")}`,
    300
  );
  return JSON.parse(raw.replace(/```json\n?|```/g,"").trim());
}

// ─── Claude: compare ──────────────────────────────────────────────────────────
async function runComparison() {
  S.phase = "comparing"; S.analysis = null; S.error = null; render();

  const ids  = DOCS.map(d=>d.id).filter(id => S.slots[id]?.text?.length > 20);
  const lbls = ids.map(id => DMAP[id].label);
  const docs = ids.map(id => `=== ${DMAP[id].label.toUpperCase()} (${S.slots[id].name}) ===\n${S.slots[id].text}`).join("\n\n");

  const sys = `You are an expert insurance broker's assistant. Compare: ${lbls.join(", ")}.
PRIORITIES: 1) Quote vs Binder must match exactly. 2) Invoice vs Binder — premium/fees/payment. 3) Application vs Quote — was it quoted correctly.
Check ALL material fields: Named Insured, Additional Insureds, Policy Number, Effective Date, Expiration Date, Coverage Type/Form, Each Limit, Aggregate Limit, Deductible, Premium, Taxes, Fees, Payment Terms, Endorsements, Exclusions.
Return ONLY valid JSON:
{"overall_status":"clear"|"review"|"conflict","summary":"<2-3 sentences>","discrepancies":[{"field":"<n>","severity":"critical"|"high"|"medium"|"low",${ids.map(id=>`"${id}":"<val>"`).join(",")},"problem_doc":"<id>","action":"fix_in_binder"|"fix_in_quote"|"contact_underwriter"|"verify_with_insured"|"review","guidance":"<what broker should do>"}],"critical_count":<n>,"next_steps":["<step>"]}`;

  try {
    const raw = await callClaude(sys, docs, 3000);
    const result = JSON.parse(raw.replace(/```json\n?|```/g,"").trim());
    S.analysis = { ...result, comparedIds: ids };
    S.phase = "results";
  } catch(e) {
    S.error = e.message; S.phase = "idle";
  }
  render();
}

async function callClaude(sys, user, maxTok=1000) {
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type":"application/json", "x-api-key":API_KEY, "anthropic-version":"2023-06-01" },
    body: JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:maxTok, system:sys, messages:[{role:"user",content:user}] }),
  });
  if (!res.ok) { const d = await res.json().catch(()=>({})); throw new Error(d?.error?.message||`API ${res.status}`); }
  const d = await res.json(); return d.content?.[0]?.text ?? "";
}

// ─── Manual assign ────────────────────────────────────────────────────────────
function openModal(att) {
  S.pending = att;
  document.getElementById("modal-fname").textContent = att.name;
  const opts = document.getElementById("modal-opts");
  opts.innerHTML = "";
  for (const def of DOCS) {
    const taken = !!S.slots[def.id];
    const btn = document.createElement("button");
    btn.className = `m-opt ${taken?"m-taken":""}`;
    btn.disabled = taken;
    btn.onclick = () => { if (!taken) doAssign(def.id); };
    btn.innerHTML = `
      <div class="m-dot" style="background:${def.color}"></div>
      <span class="m-lbl" style="color:${def.color}">${def.label}</span>
      ${taken ? `<span class="m-cur">${esc(S.slots[def.id].name.slice(0,16))}…</span>` : ""}
      <span class="s-badge ${def.required?"b-req":"b-opt"}">${def.required?"Req":"Opt"}</span>`;
    opts.appendChild(btn);
  }
  document.getElementById("modal").style.display = "flex";
}

function doAssign(roleId) {
  if (!S.pending?.text) return;
  S.slots[roleId] = { name: S.pending.name, text: S.pending.text };
  S.analysis = null;
  document.getElementById("btn-clr").style.display = "block";
  closeModal(); render();
}

function closeModal() { document.getElementById("modal").style.display = "none"; S.pending = null; }

function removeSlot(id) { delete S.slots[id]; S.analysis = null; render(); }

function clearAll() {
  S.slots = {}; S.analysis = null; S.error = null; S.phase = "idle";
  document.getElementById("btn-clr").style.display = "none";
  render();
}

// ─── Render ───────────────────────────────────────────────────────────────────
function render() {
  const b = document.getElementById("body");
  b.innerHTML = "";
  const add = el => b.appendChild(el);

  // Onboarding tip
  if (!Object.keys(S.slots).length && S.phase === "idle") {
    const tip = div("tip");
    tip.innerHTML = `<strong>How this works:</strong> Click the 📌 pin icon at the top of this panel to keep it open. Then click each email from your underwriter and hit <em>Add from email</em>. Do that for all three emails, then click <strong>Compare Documents</strong>.`;
    add(tip);
  }

  // Loading
  if (S.phase === "loading") {
    add(makeCard("Reading attachments…", loadRow("Downloading and extracting text…")));
  }

  // Attachment list
  if (S.atts.length && S.phase !== "loading") {
    add(makeAttsCard());
  }

  // Error
  if (S.error) add(makeErr(S.error));

  // Slots
  add(makeSlotsCard());

  // Action / compare button
  if (S.phase !== "loading" && S.phase !== "comparing") add(makeActBar());
  if (S.phase === "comparing") add(makeCard("Analyzing documents…", loadRow("Claude is reviewing — about 15 seconds…")));

  // Results
  if (S.phase === "results" && S.analysis) {
    add(makeBanner());
    if (S.analysis.next_steps?.length) add(makeNextSteps());
    add(makeDiscPanel());
  }
}

// ─── UI builders ─────────────────────────────────────────────────────────────
function div(cls, html="") { const d = document.createElement("div"); d.className = cls; if (html) d.innerHTML = html; return d; }

function makeCard(title, ...children) {
  const c = div("card");
  c.innerHTML = `<div class="card-hdr">${title}</div>`;
  children.forEach(ch => c.appendChild(ch));
  return c;
}

function loadRow(msg) {
  const d = div("loading-row");
  d.innerHTML = `<div class="spin"></div><span>${msg}</span>`;
  return d;
}

function makeErr(msg, tip) {
  const d = div("err-bar");
  d.innerHTML = `<div class="err-t">Error</div><div class="err-m">${esc(msg)}</div>
    ${tip?`<div class="err-tip">${tip}</div>`:""}`;
  return d;
}

function makeAttsCard() {
  const card = makeCard(`${S.atts.length} attachment${S.atts.length>1?"s":""} in this email`);
  const list = div("att-list");
  for (const att of S.atts) {
    const ext = att.name.toLowerCase().split(".").pop();
    const sup = ["pdf","docx","txt"].includes(ext);
    const alreadyIn = Object.values(S.slots).some(s => s.name === att.name);
    const row = div(`att-row${sup && att.text ? " clickable" : ""}`);
    if (sup && att.text) row.onclick = () => openModal(att);
    const icon = ext==="pdf"?"📄":ext==="docx"?"📝":"📃";
    let chip = "";
    if (att.loading) chip = `<div class="spin"></div>`;
    else if (att.err) chip = `<span class="chip chip-err" title="${esc(att.err)}">Error</span>`;
    else if (alreadyIn) chip = `<span class="chip chip-ok">Assigned ✓</span>`;
    else if (att.text) chip = `<span class="chip chip-tap">Tap to assign →</span>`;
    else if (!sup) chip = `<span class="chip chip-no">Not supported</span>`;
    row.innerHTML = `<span style="font-size:14px">${icon}</span><span class="att-name">${esc(att.name)}</span>${chip}`;
    list.appendChild(row);
  }
  if (!S.atts.length) {
    const n = div("no-atts"); n.textContent = "No attachments in this email"; list.appendChild(n);
  }
  card.appendChild(list); return card;
}

function makeSlotsCard() {
  const card = makeCard("Document slots");
  const list = div("slot-list");
  for (const def of DOCS) {
    const doc = S.slots[def.id];
    const row = div("slot-row");
    const dotCls = doc ? "d-ok" : def.required ? "d-req" : "d-opt";
    row.innerHTML = `
      <div class="s-dot ${dotCls}"></div>
      <div class="s-lbl" style="color:${def.color}">${def.label}</div>
      <div class="s-val${doc?" ok":""}">${doc ? esc(doc.name.length>16?doc.name.slice(0,14)+"…":doc.name) : "Not loaded"}</div>
      <span class="s-badge ${def.required?"b-req":"b-opt"}">${def.required?"Req":"Opt"}</span>
      ${doc ? `<button class="s-rem" onclick="removeSlot('${def.id}')" title="Remove">✕</button>` : ""}`;
    list.appendChild(row);
  }
  card.appendChild(list); return card;
}

function makeActBar() {
  const reqIds = DOCS.filter(d=>d.required).map(d=>d.id);
  const ready  = reqIds.every(id => S.slots[id]?.text?.length > 20);
  const miss   = reqIds.filter(id => !S.slots[id]).map(id => DMAP[id].label);
  const bar = div("act-bar");
  const note = div(`act-note ${!ready?"warn":Object.keys(S.slots).length===4?"good":"muted"}`);
  note.textContent = !ready
    ? `Still needed: ${miss.join(", ")}`
    : Object.keys(S.slots).length === 4
    ? "All 4 documents ready."
    : "Quote, Binder, Invoice loaded. Application is optional.";
  const btn = document.createElement("button");
  btn.id = "btn-cmp"; btn.textContent = "Compare Documents";
  btn.disabled = !ready; btn.onclick = runComparison;
  bar.appendChild(note); bar.appendChild(btn); return bar;
}

function makeBanner() {
  const a = S.analysis;
  const cfg = {
    clear:    { color:"#15803D", bg:"#F0FDF4", border:"#BBF7D0", icon:"✓" },
    review:   { color:"#B45309", bg:"#FFFBEB", border:"#FDE68A", icon:"!" },
    conflict: { color:"#B91C1C", bg:"#FEF2F2", border:"#FECACA", icon:"✕" },
  }[a.overall_status] ?? { color:"#B45309", bg:"#FFFBEB", border:"#FDE68A", icon:"!" };
  const n = a.discrepancies?.length ?? 0;
  const el = div("r-banner");
  el.style.cssText = `background:${cfg.bg};border:1px solid ${cfg.border};border-radius:9px;`;
  el.innerHTML = `
    <div class="r-icon" style="border-color:${cfg.color};color:${cfg.color};background:rgba(255,255,255,.7)">${cfg.icon}</div>
    <div>
      <div class="r-status" style="color:${cfg.color}">${n===0?"All Clear":n<=2?"Review Needed":"Conflicts Found"}${n>0?` <span style="font-weight:400;font-size:10px;opacity:.8">— ${n} issue${n>1?"s":""}</span>`:""}</div>
      <div class="r-summ" style="color:${n===0?"#166534":"#374151"}">${esc(a.summary)}</div>
      <div class="r-docs">${(a.comparedIds||[]).map(id=>`<span class="r-dtag">${DMAP[id]?.label||id}</span>`).join("")}</div>
    </div>`;
  return el;
}

function makeNextSteps() {
  const card = makeCard("Next Steps");
  const list = div("next-list");
  S.analysis.next_steps.forEach((s,i) => {
    const row = div("n-row");
    row.innerHTML = `<div class="n-num">${i+1}</div><div>${esc(s)}</div>`;
    list.appendChild(row);
  });
  card.appendChild(list); return card;
}

function makeDiscPanel() {
  const a = S.analysis;
  const card = div("card");
  if (!a.discrepancies?.length) {
    card.innerHTML = `<div class="all-ok"><div class="ao-ring">✓</div><h3>All documents align</h3><p>No material discrepancies found.</p></div>`;
    return card;
  }
  const sorted = [...a.discrepancies].sort((x,y) => ["critical","high","medium","low"].indexOf(x.severity)-["critical","high","medium","low"].indexOf(y.severity));
  const critBadge = a.critical_count > 0 ? `<span style="font-size:9px;background:#450A0A;color:#FCA5A5;padding:2px 7px;border-radius:4px;font-weight:700">${a.critical_count} critical</span> ` : "";
  card.innerHTML = `<div class="card-hdr">${critBadge}${sorted.length} Discrepanc${sorted.length===1?"y":"ies"}</div>`;
  const wrap = div("disc-wrap");
  for (const d of sorted) {
    const act = ACTIONS[d.action] ?? ACTIONS.review;
    const cols = a.comparedIds.length === 3 ? "c3" : "";
    const vals = a.comparedIds.map(id => {
      const v = d[id]; const bad = d.problem_doc === id;
      return `<div class="dv${bad?" bad":""}">
        <div class="dv-lbl" style="color:${DMAP[id]?.color||"#6B7280"}">${DMAP[id]?.label||id}${bad?" ⚠":""}</div>
        <div class="dv-val${(!v||v==="null")?" dv-null":""}">${v&&v!=="null"?esc(v):"not stated"}</div>
      </div>`;
    }).join("");
    const item = div("d-item");
    item.innerHTML = `
      <div class="d-top">
        <span class="sev sev-${d.severity}">${d.severity}</span>
        <span class="d-field">${esc(d.field)}</span>
        <span class="a-tag" style="background:${act.bg};color:${act.color}">${act.label}</span>
      </div>
      <div class="d-vals ${cols}">${vals}</div>
      ${d.guidance?`<div class="guidance"><strong>Action:</strong> ${esc(d.guidance)}</div>`:""}`;
    wrap.appendChild(item);
  }
  card.appendChild(wrap); return card;
}

function esc(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function showFatal(msg) { document.getElementById("body").innerHTML = `<div class="err-bar" style="margin:14px"><div class="err-t">Error</div><div class="err-m">${esc(msg)}</div></div>`; }
</script>
